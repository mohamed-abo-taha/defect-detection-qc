name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (CPU torch + package)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install timm scikit-learn pillow numpy pytest
          pip install -e . --no-deps
      - name: Run fast unit tests (no downloads, no GPU)
        run: pytest -q tests/test_losses.py tests/test_utils.py tests/test_metrics.py tests/test_convert.py
